<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Task Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="mb-4">Task Details</h3>

<p><b>Title:</b> <span th:text="${task.title}"></span></p>

<p><b>Description:</b> <span th:text="${task.description}"></span></p>

<p><b>Status:</b> <span th:text="${task.status}"></span></p>

<p><b>User:</b> <span th:text="${task.user.name}"></span></p>

<p><b>Project:</b> <span th:text="${task.project.projectName}"></span></p>

<a href="/viewTask" class="btn btn-secondary">
Back
</a>

</div>

</div>

</body>
</html>
