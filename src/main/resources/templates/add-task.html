<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Create Task</title>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(to right,#e3f2fd,#f8f9fa);
}

.form-container{
max-width:700px;
margin:auto;
margin-top:70px;
}

.card{
border-radius:12px;
box-shadow:0px 5px 15px rgba(0,0,0,0.15);
}

.card-header{
font-size:22px;
font-weight:bold;
}

</style>

</head>


<body>

<div class="container">

<div class="form-container">

<div class="card">

<div class="card-header bg-primary text-white text-center">

Create New Task

</div>


<div class="card-body">

<form th:action="@{/saveTask}" th:object="${task}" method="post">


<div class="mb-3">

<label class="form-label">Task Title</label>

<input type="text"
class="form-control"
placeholder="Enter task title"
th:field="*{title}">

</div>



<div class="mb-3">

<label class="form-label">Description</label>

<textarea
class="form-control"
rows="3"
placeholder="Enter task description"
th:field="*{description}">
</textarea>

</div>



<div class="mb-3">

<label class="form-label">Status</label>

<select class="form-select" th:field="*{status}">

	<option value="">Select Status</option>

	<option value="TO_DO">TO DO</option>

	<option value="IN_PROGRESS">IN PROGRESS</option>

	<option value="COMPLETED">COMPLETED</option>

</select>

</div>



<div class="mb-3">

<label class="form-label">Assign User</label>

<select class="form-select" th:field="*{user.id}">

<option value="">Select User</option>

<option th:each="u : ${users}"
th:value="${u.id}"
th:text="${u.name}">
</option>

</select>

</div>



<div class="mb-4">

<label class="form-label">Project</label>

<select class="form-select" th:field="*{project.id}">

<option value="">Select Project</option>

<option th:each="p : ${projects}"
th:value="${p.id}"
th:text="${p.projectName}">
</option>

</select>

</div>


<div class="d-flex justify-content-between">

<a href="/viewTask" class="btn btn-secondary">
Back
</a>

<button type="submit" class="btn btn-success">
Save Task
</button>

</div>


</form>

</div>

</div>

</div>

</div>

</body>

</html>
