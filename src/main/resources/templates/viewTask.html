<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Task Board</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(to right,#2c3e50,#4ca1af);
min-height:100vh;
font-family:Arial;
}

.board-column{
background:white;
border-radius:10px;
padding:20px;
min-height:450px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.task-card{
background:#f8f9fa;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.task-card h6{
font-weight:bold;
}

.task-card p{
font-size:14px;
color:gray;
}

</style>

</head>

<body>

<div class="container mt-4">

<!-- CREATE TASK BUTTON -->

<div class="text-end mb-3">

<a href="/addTask" class="btn btn-warning btn-lg shadow">
+ Create New Task
</a>

</div>

<h2 class="text-center text-white mb-4">
Task Board
</h2>

<div class="row">

<!-- ================= TO DO COLUMN ================= -->

<div class="col-md-4">

<div class="board-column">

<h4 class="text-center mb-4">
🟡 TO DO
</h4>

<div th:each="task : ${tasks}">

<div th:if="${task.status == 'TO_DO'}" class="task-card">

<h6 th:text="${task.title}"></h6>

<p>
Project :
<span th:text="${task.project.projectName}"></span>
</p>

<p>
Assigned :
<span th:text="${task.user.name}"></span>
</p>

<a th:href="@{/viewTaskDetails/{id}(id=${task.id})}"
class="btn btn-sm btn-info">
View
</a>

<a th:href="@{/updateStatus/{id}/{status}(id=${task.id},status='IN_PROGRESS')}"
class="btn btn-sm btn-primary">
Start
</a>

<a th:href="@{/deleteTask/{id}(id=${task.id})}"
class="btn btn-sm btn-danger">
Delete
</a>

</div>

</div>

</div>

</div>

<!-- ================= IN PROGRESS COLUMN ================= -->

<div class="col-md-4">

<div class="board-column">

<h4 class="text-center mb-4">
🔵 IN PROGRESS
</h4>

<div th:each="task : ${tasks}">

<div th:if="${task.status == 'IN_PROGRESS'}" class="task-card">

<h6 th:text="${task.title}"></h6>

<p>
Project :
<span th:text="${task.project.projectName}"></span>
</p>

<p>
Assigned :
<span th:text="${task.user.name}"></span>
</p>

<a th:href="@{/viewTaskDetails/{id}(id=${task.id})}"
class="btn btn-sm btn-info">
View
</a>

<a th:href="@{/updateStatus/{id}/{status}(id=${task.id},status='COMPLETED')}"
class="btn btn-sm btn-success">
Complete
</a>

<a th:href="@{/deleteTask/{id}(id=${task.id})}"
class="btn btn-sm btn-danger">
Delete
</a>

</div>

</div>

</div>

</div>

<!-- ================= COMPLETED COLUMN ================= -->

<div class="col-md-4">

<div class="board-column">

<h4 class="text-center mb-4">
🟢 COMPLETED
</h4>

<div th:each="task : ${tasks}">

<div th:if="${task.status == 'COMPLETED'}" class="task-card">

<h6 th:text="${task.title}"></h6>

<p>
Project :
<span th:text="${task.project.projectName}"></span>
</p>

<p>
Assigned :
<span th:text="${task.user.name}"></span>
</p>

<span class="badge bg-success mb-2">
Done
</span>

<br>

<a th:href="@{/viewTaskDetails/{id}(id=${task.id})}"
class="btn btn-sm btn-info">
View
</a>

<a th:href="@{/deleteTask/{id}(id=${task.id})}"
class="btn btn-sm btn-danger">
Delete
</a>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
