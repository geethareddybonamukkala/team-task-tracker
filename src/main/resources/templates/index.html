<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Team Task Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(to right,#2c3e50,#4ca1af);
min-height:100vh;
}

.dashboard-title{
color:white;
font-weight:bold;
margin-bottom:40px;
}

.card{
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0px 10px 25px rgba(0,0,0,0.3);
}

.card-body{
padding:40px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center dashboard-title">
Team Task Tracker Dashboard
</h1>

<div class="row justify-content-center">

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h4>Users</h4>

<p>Manage team members</p>

<a href="/viewUsers" class="btn btn-primary w-100">
Manage Users
</a>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h4>Projects</h4>

<p>Manage project details</p>

<a href="/viewProjects" class="btn btn-success w-100">
Manage Projects
</a>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h4>Tasks</h4>

<p>Manage assigned tasks</p>

<a href="/viewTask" class="btn btn-warning w-100">
Manage Tasks
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
